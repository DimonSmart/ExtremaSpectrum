name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Pack and Publish NuGet
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Extract version from tag
      id: extract_version
      shell: bash
      run: |
        version="${GITHUB_REF#refs/tags/v}"
        if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
          echo "Unsupported version tag: $version"
          exit 1
        fi

        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Restore dependencies
      run: dotnet restore ExtremaSpectrum.slnx

    - name: Build solution
      run: dotnet build ExtremaSpectrum.slnx --configuration Release --no-restore -p:Version=${{ steps.extract_version.outputs.version }} -p:PackageVersion=${{ steps.extract_version.outputs.version }}

    - name: Run tests
      run: dotnet test ExtremaSpectrum.slnx --configuration Release --no-build --verbosity normal

    - name: Create NuGet package
      run: dotnet pack src/ExtremaSpectrum/ExtremaSpectrum.csproj --configuration Release --no-build -p:Version=${{ steps.extract_version.outputs.version }} -p:PackageVersion=${{ steps.extract_version.outputs.version }} --output ./artifacts

    - name: Upload packages as artifact
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: |
          ./artifacts/*.nupkg
          ./artifacts/*.snupkg

    - name: Create GitHub release
      uses: softprops/action-gh-release@v3
      with:
        files: |
          ./artifacts/*.nupkg
          ./artifacts/*.snupkg
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish package to NuGet
      run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Publish symbols to NuGet
      run: dotnet nuget push ./artifacts/*.snupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
