name: Build and Test

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build-and-test:
    name: Build and Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet-version: ['10.0.x']

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup .NET ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Restore dependencies
      run: dotnet restore ExtremaSpectrum.slnx

    - name: Build solution
      run: dotnet build ExtremaSpectrum.slnx --configuration Release --no-restore

    - name: Run tests
      run: dotnet test ExtremaSpectrum.slnx --configuration Release --no-build --verbosity normal
